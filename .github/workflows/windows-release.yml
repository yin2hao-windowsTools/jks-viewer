name: Windows Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows packages
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Parse version tag
        id: version
        shell: pwsh
        run: .\.github\scripts\windows-release.ps1 parse-version -Tag '${{ github.ref_name }}'

      - name: Install WiX Toolset
        shell: pwsh
        run: .\.github\scripts\windows-release.ps1 install-wix

      - name: Build EXE, MSI, and portable packages
        shell: pwsh
        run: |
          .\gradlew.bat clean test packageWindowsRelease `
            "-PappVersion=${{ steps.version.outputs.app_version }}" `
            "-PinstallerVersion=${{ steps.version.outputs.installer_version }}"

      - name: List release files
        shell: pwsh
        run: Get-ChildItem build\release | Format-Table Name, Length

      - name: Upload test build artifacts
        if: steps.version.outputs.is_prerelease == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: jks-viewer-${{ steps.version.outputs.app_version }}-windows
          path: build/release/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: steps.version.outputs.is_prerelease == 'false'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          .\.github\scripts\windows-release.ps1 publish-release `
            -Tag '${{ steps.version.outputs.tag }}' `
            -AppVersion '${{ steps.version.outputs.app_version }}' `
            -ReleaseDir build\release
